<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Firebase - Aprendizado</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #0a0618;
      background-image:
        linear-gradient(rgba(186,125,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(186,125,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      color: #e0d6f5;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ba7dff;
      margin-bottom: 8px;
      font-size: 22px;
    }

    .subtitulo {
      text-align: center;
      color: rgba(186,125,255,0.6);
      font-size: 13px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(20,10,45,0.85);
      border: 1px solid rgba(186,125,255,0.2);
      border-radius: 16px;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto 20px;
      box-shadow: 0 0 40px rgba(186,125,255,0.08);
    }

    .card h2 {
      color: #d4aaff;
      font-size: 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid rgba(186,125,255,0.3);
      background: rgba(30,15,55,0.9);
      color: #e0d6f5;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input::placeholder { color: rgba(186,125,255,0.4); }

    input:focus {
      border-color: #ba7dff;
      box-shadow: 0 0 0 3px rgba(186,125,255,0.15);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #7a3fd4;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      margin-top: 4px;
    }

    button:hover {
      background: #9a5ff4;
      transform: translateY(-1px);
    }

    button:disabled {
      background: rgba(122,63,212,0.4);
      cursor: not-allowed;
      transform: none;
    }

    /* Status */
    #status {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }

    #status.success {
      background: rgba(37,211,102,0.15);
      border: 1px solid rgba(37,211,102,0.4);
      color: #25D366;
      display: block;
    }

    #status.error {
      background: rgba(220,53,69,0.15);
      border: 1px solid rgba(220,53,69,0.4);
      color: #ff6b7a;
      display: block;
    }

    #status.loading {
      background: rgba(186,125,255,0.1);
      border: 1px solid rgba(186,125,255,0.3);
      color: #ba7dff;
      display: block;
    }

    /* Lista de cadastros */
    .lista-vazia {
      text-align: center;
      color: rgba(186,125,255,0.4);
      padding: 20px;
      font-size: 14px;
    }

    .item {
      background: rgba(30,15,60,0.7);
      border: 1px solid rgba(186,125,255,0.15);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.3s;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { background: rgba(186,125,255,0.1); }

    .item-info strong {
      display: block;
      color: #e0d6f5;
      font-size: 15px;
    }

    .item-info span {
      font-size: 12px;
      color: rgba(186,125,255,0.6);
    }

    .btn-deletar {
      width: auto;
      padding: 6px 12px;
      font-size: 12px;
      background: rgba(108,31,58,0.8);
      border-radius: 6px;
      margin-top: 0;
    }

    .btn-deletar:hover { background: #a0263f; }

    .contador {
      text-align: center;
      color: rgba(186,125,255,0.5);
      font-size: 12px;
      margin-top: 8px;
    }

    /* Indicador de conexão */
    .conexao {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      margin-bottom: 16px;
      color: rgba(186,125,255,0.5);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
    }

    .dot.online { background: #25D366; box-shadow: 0 0 6px #25D366; }
    .dot.offline { background: #dc3545; }
  </style>
</head>
<body>

  <h1>🔥 Cadastro Firebase</h1>
  <p class="subtitulo">App de aprendizado — dados salvos na nuvem</p>

  <div class="conexao">
    <div class="dot" id="dot"></div>
    <span id="conexao-txt">Conectando...</span>
  </div>

  <!-- Formulário -->
  <div class="card">
    <h2>➕ Novo Cadastro</h2>
    <div id="status"></div>
    <input type="text" id="nome" placeholder="Nome completo" maxlength="60">
    <input type="text" id="telefone" placeholder="Telefone" maxlength="20">
    <input type="text" id="cidade" placeholder="Cidade" maxlength="40">
    <button id="btn-salvar" onclick="salvar()">💾 Salvar no Firebase</button>
  </div>

  <!-- Lista -->
  <div class="card">
    <h2>📋 Cadastros salvos</h2>
    <div id="lista"><div class="lista-vazia">Carregando...</div></div>
    <div class="contador" id="contador"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      doc,
      onSnapshot,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ============================
    //  SUAS CREDENCIAIS FIREBASE
    // ============================
    const firebaseConfig = {
      apiKey: "AIzaSyCN81LSya9eIGY1y1r8pFG67CyhKHL5mQU",
      authDomain: "cadastrosaidas.firebaseapp.com",
      projectId: "cadastrosaidas",
      storageBucket: "cadastrosaidas.firebasestorage.app",
      messagingSenderId: "701449632259",
      appId: "1:701449632259:web:e44106ca4571ede006ac36"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Indicador de conexão
    const dot = document.getElementById('dot');
    const conexaoTxt = document.getElementById('conexao-txt');

    function setConexao(online) {
      dot.className = 'dot ' + (online ? 'online' : 'offline');
      conexaoTxt.textContent = online ? 'Conectado ao Firebase ✓' : 'Sem conexão';
    }

    // Status
    function mostrarStatus(msg, tipo) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = tipo;
      if (tipo !== 'loading') setTimeout(() => el.className = '', 3000);
    }

    // SALVAR
    window.salvar = async function() {
      const nome = document.getElementById('nome').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const cidade = document.getElementById('cidade').value.trim();

      if (!nome) {
        mostrarStatus('⚠️ Preencha o nome!', 'error');
        return;
      }

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      mostrarStatus('💾 Salvando...', 'loading');

      try {
        await addDoc(collection(db, "cadastros"), {
          nome,
          telefone,
          cidade,
          criadoEm: serverTimestamp()
        });

        mostrarStatus('✅ Salvo com sucesso!', 'success');
        document.getElementById('nome').value = '';
        document.getElementById('telefone').value = '';
        document.getElementById('cidade').value = '';
        setConexao(true);
      } catch (erro) {
        mostrarStatus('❌ Erro: ' + erro.message, 'error');
        setConexao(false);
        console.error(erro);
      } finally {
        btn.disabled = false;
      }
    };

    // DELETAR
    window.deletar = async function(id) {
      if (!confirm('Remover este cadastro?')) return;
      try {
        await deleteDoc(doc(db, "cadastros", id));
      } catch (erro) {
        alert('Erro ao deletar: ' + erro.message);
      }
    };

    // LISTAR em tempo real (atualiza automaticamente!)
    const q = query(collection(db, "cadastros"), orderBy("criadoEm", "desc"));

    onSnapshot(q, (snapshot) => {
      setConexao(true);
      const lista = document.getElementById('lista');
      const contador = document.getElementById('contador');

      if (snapshot.empty) {
        lista.innerHTML = '<div class="lista-vazia">Nenhum cadastro ainda. Adicione o primeiro! 👆</div>';
        contador.textContent = '';
        return;
      }

      lista.innerHTML = '';
      snapshot.forEach(docSnap => {
        const d = docSnap.data();
        const data = d.criadoEm?.toDate().toLocaleDateString('pt-BR') || '—';

        const item = document.createElement('div');
        item.className = 'item';
        item.innerHTML = `
          <div class="item-info">
            <strong>${d.nome}</strong>
            <span>${d.telefone || '—'} · ${d.cidade || '—'} · ${data}</span>
          </div>
          <button class="btn-deletar" onclick="deletar('${docSnap.id}')">🗑️</button>
        `;
        lista.appendChild(item);
      });

      const total = snapshot.size;
      contador.textContent = total + ' cadastro' + (total !== 1 ? 's' : '') + ' na nuvem';

    }, (erro) => {
      setConexao(false);
      document.getElementById('lista').innerHTML =
        '<div class="lista-vazia">❌ Erro de conexão. Verifique o Firebase.</div>';
      console.error(erro);
    });

    // Enter para salvar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.salvar();
    });

  </script>
</body>
</html>
